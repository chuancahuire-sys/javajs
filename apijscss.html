<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario con EmailJS</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a2a6c, #2b5876, #4e4376);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      padding: 20px;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(to right, #2575fc, #6a11cb);
      color: white;
      padding: 25px;
      text-align: center;
    }

    .header h2 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .form-container {
      padding: 25px;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 42px;
      color: #2575fc;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 14px 14px 14px 45px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #2575fc;
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 117, 252, 0.2);
    }

    .input-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(to right, #2575fc, #6a11cb);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(37, 117, 252, 0.3);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(37, 117, 252, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2575fc;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .success-message {
      display: none;
      text-align: center;
      color: #28a745;
      background: #d4edda;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      border: 1px solid #c3e6cb;
      animation: fadeIn 0.5s;
    }

    .error-message {
      display: none;
      text-align: center;
      color: #dc3545;
      background: #f8d7da;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      border: 1px solid #f5c6cb;
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #6c757d;
      font-size: 14px;
      border-top: 1px solid #e9ecef;
    }

    @media (max-width: 500px) {
      .container {
        max-width: 100%;
      }

      .header {
        padding: 20px;
      }

      .form-container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h2>Formulario de Contacto</h2>
      <p>Envíanos un mensaje y te responderemos pronto</p>
    </div>

    <div class="form-container">
      <form id="contactForm">
        <div class="input-group">
          <label for="nombre">Nombre completo</label>
          <i class="fas fa-user"></i>
          <input type="text" id="nombre" placeholder="Ingresa tu nombre" required>
        </div>

        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="input-group">
          <label for="mensaje">Mensaje</label>
          <i class="fas fa-comment"></i>
          <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..." required></textarea>
        </div>

        <button type="submit" id="submitBtn">
          <i class="fas fa-paper-plane"></i> Enviar mensaje
        </button>
      </form>

      <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>Enviando mensaje...</p>
      </div>

      <div class="success-message" id="successMessage">
        <i class="fas fa-check-circle"></i> ¡Mensaje enviado correctamente!
      </div>

      <div class="error-message" id="errorMessage">
        <i class="fas fa-exclamation-circle"></i> Error al enviar el mensaje. Intenta nuevamente.
      </div>
    </div>

    <div class="footer">
      <p>© 2026 - Todos los derechos reservados</p>
      <br>

      <a href="apijscss.html">Formulario con CSS3</a>
      <br>
      <a href="permanencia.html">II Unidad</a>

    </div>
  </div>

  <script>
    // Inicializar EmailJS
    (function () {
      emailjs.init("2kItquBhpJcEUpG10");
    })();

    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();

      // Mostrar carga
      document.getElementById('loading').style.display = 'block';
      document.getElementById('successMessage').style.display = 'none';
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('submitBtn').disabled = true;

      // Obtener valores del formulario
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const mensaje = document.getElementById('mensaje').value;

      // Enviar correo
      emailjs.send("service_kfeda89", "template_yy1ub79", {
        from_name: nombre,
        from_email: email,
        message: mensaje,
        reply_to: email,
        date: new Date().toLocaleDateString('es-ES')
      })
        .then((response) => {
          console.log("Correo enviado!", response.status, response.text);

          // Mostrar mensaje de éxito
          document.getElementById('loading').style.display = 'none';
          document.getElementById('successMessage').style.display = 'block';
          document.getElementById('submitBtn').disabled = false;

          // Limpiar formulario
          document.getElementById('contactForm').reset();

          // Ocultar mensaje después de 5 segundos
          setTimeout(() => {
            document.getElementById('successMessage').style.display = 'none';
          }, 5000);
        })
        .catch((error) => {
          console.error("Error al enviar:", error);

          // Mostrar mensaje de error
          document.getElementById('loading').style.display = 'none';
          document.getElementById('errorMessage').style.display = 'block';
          document.getElementById('submitBtn').disabled = false;

          // Ocultar mensaje después de 5 segundos
          setTimeout(() => {
            document.getElementById('errorMessage').style.display = 'none';
          }, 5000);
        });
    });
  </script>
</body>

</html>
